<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="TrueHome - Find your perfect student hostel and rental property in Uganda.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="TrueHome">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>TrueHome</title>
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <script>
    const flutterCleanupKey = 'truehome_flutter_cleanup_v1';

    async function cleanupOldFlutterCacheOnce() {
      if (!('serviceWorker' in navigator)) return;

      const alreadyCleaned = localStorage.getItem(flutterCleanupKey) === 'done';
      if (alreadyCleaned) return;

      try {
        const registrations = await navigator.serviceWorker.getRegistrations();
        for (const registration of registrations) {
          const scriptUrl =
            registration.active?.scriptURL ||
            registration.waiting?.scriptURL ||
            registration.installing?.scriptURL ||
            '';

          if (scriptUrl.includes('flutter_service_worker.js')) {
            await registration.unregister();
          }
        }

        if ('caches' in window) {
          const cacheKeys = await caches.keys();
          const flutterCacheKeys = cacheKeys.filter((key) =>
            key.startsWith('flutter-app-cache') ||
            key.startsWith('flutter-temp-cache') ||
            key.startsWith('flutter-assets')
          );
          await Promise.all(flutterCacheKeys.map((key) => caches.delete(key)));
        }

        localStorage.setItem(flutterCleanupKey, 'done');
      } catch (error) {
        console.log('Flutter cache cleanup failed:', error);
      }
    }

    async function registerFirebaseMessagingServiceWorker() {
      if (!('serviceWorker' in navigator)) return;

      try {
        const registration = await navigator.serviceWorker.register('/firebase-messaging-sw.js');
        console.log('Firebase messaging service worker registered:', registration.scope);
      } catch (error) {
        console.log('Firebase messaging service worker registration failed:', error);
      }
    }

    window.addEventListener('load', async function () {
      await cleanupOldFlutterCacheOnce();
      await registerFirebaseMessagingServiceWorker();
    });
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
